{% load static %}
<section id="hero-figma" class="hero-figma" data-tight>
  <div class="hero-banner">
    <img class="hero-ellipse hero-ellipse-right" src="{% static 'images/figma-mcp/hero-ellipse.svg' %}" alt="" />
    <img class="hero-ellipse hero-ellipse-left" src="{% static 'images/figma-mcp/hero-ellipse.svg' %}" alt="" />

    <div class="hero-trust">
      <span>
        <img src="{% static 'icons/check-circle.svg' %}" alt="" />
        Trusted by 15,000+ Students
      </span>
      <span>
        <img src="{% static 'icons/check-circle.svg' %}" alt="" />
        10 Years of Excellence
      </span>
    </div>

    <h1 class="hero-heading">
      <span class="hero-heading-accent">Nagpur&rsquo;s First Academy</span> to Offer a
      <br />
      Full-Stack AI Engineering Program
    </h1>

    <div class="hero-ctas">
      <a href="{% url 'contact' %}" class="hero-btn hero-btn-primary">Download Brochure</a>
      <a href="{% url 'courses' %}" class="hero-btn hero-btn-secondary">Explore Courses</a>
    </div>

    <div class="hero-stats">
      <article class="hero-stat hero-stat-w1">
        <div class="hero-stat-glow"></div>
        <div class="hero-stat-card">
          <div class="hero-stat-icon hero-stat-red">
            <img src="{% static 'icons/check-badge.svg' %}" alt="" />
          </div>
          <div>
            <h2>Industry Certified</h2>
            <p>96% Placement Rate</p>
          </div>
        </div>
      </article>

      <article class="hero-stat hero-stat-w2">
        <div class="hero-stat-glow"></div>
        <div class="hero-stat-card">
          <div class="hero-stat-icon hero-stat-yellow">
            <img src="{% static 'icons/star-rating.svg' %}" alt="" />
          </div>
          <div>
            <h2>4.8/5 Rating</h2>
            <p>From 1,200+ Reviews</p>
          </div>
        </div>
      </article>

      <article class="hero-stat hero-stat-w3">
        <div class="hero-stat-glow"></div>
        <div class="hero-stat-card">
          <div class="hero-stat-icon hero-stat-blue">
            <img src="{% static 'icons/users-group-icon.svg' %}" alt="" />
          </div>
          <div>
            <h2>15,000+ Alumni</h2>
            <p>And Growing Strong</p>
          </div>
        </div>
      </article>
    </div>
  </div>

  <div class="hero-wave">
    <picture>
      <source media="(max-width: 640px)" srcset="{% static 'images/hero-wave-mobile.svg' %}" />
      <img src="{% static 'images/hero-wave-desktop.svg' %}" alt="" />
    </picture>
  </div>
</section>
