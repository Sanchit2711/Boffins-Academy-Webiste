{# components/section_wave.html #}

{% if position == "top" %}
<div
  class="
    absolute
    top-0
    left-0
    w-full
    pointer-events-none
    overflow-hidden
  "
>
  <svg
    class="block w-full h-[64px] sm:h-[80px] md:h-[80px]"
    viewBox="0 60 1280 120"
    preserveAspectRatio="none"
    xmlns="http://www.w3.org/2000/svg"
  >
    <defs>
      <filter id="waveShadowTop" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow
          dx="0"
          dy="10"
          stdDeviation="14"
          flood-color="rgba(0,0,0,0.18)"
        />
      </filter>
    </defs>

    <path
      filter="url(#waveShadowTop)"
      d="
        M0 60
        C160 20, 320 100, 480 80
        C640 60, 800 10, 960 40
        C1120 70, 1200 90, 1280 60
        L1280 0
        L0 0
        Z
      "
      fill="#F4F2FF"
    />
  </svg>
</div>
{% endif %}

{% if position == "bottom" %}
<div
  class="
    absolute
    bottom-0
    left-0
    w-full
    pointer-events-none
    overflow-hidden
  "
>
  <svg
    class="block w-full h-[64px] sm:h-[80px] md:h-[140px] rotate-180"
    viewBox="0 0 1280 180"
    preserveAspectRatio="none"
    xmlns="http://www.w3.org/2000/svg"
  >
    <defs>
      <filter id="waveShadowBottom" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow
          dx="0"
          dy="10"
          stdDeviation="14"
          flood-color="rgba(0,0,0,0.18)"
        />
      </filter>
    </defs>

    <path
      filter="url(#waveShadowBottom)"
      d="
        M0 60
        C160 20, 320 100, 480 80
        C640 60, 800 10, 960 40
        C1120 70, 1200 90, 1280 60
        L1280 0
        L0 0
        Z
      "
      fill="#F4F2FF"
    />
  </svg>
</div>
{% endif %}
