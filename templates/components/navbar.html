<style>
@import url("https://fonts.googleapis.com/css2?family=Bona+Nova+SC&display=swap");

.site-menu-btn {

<script>
(() => {
  const root = document.getElementById("navbar");
  if (!root) return;

  const openBtn = document.getElementById("nav-menu-btn");
  const drawer = document.getElementById("nav-drawer");
  const closeBtn = document.getElementById("nav-drawer-close");
  const miniCloseBtn = document.getElementById("nav-drawer-mini-close");
  const backdrop = document.getElementById("nav-drawer-backdrop");
  const desktopLinks = [...root.querySelectorAll(".site-nav-links a")];
  const drawerLinks = [...root.querySelectorAll(".site-drawer-nav a")];
  const allLinks = [...desktopLinks, ...drawerLinks];
  const focusableDrawerNodes = () =>
    [...drawer.querySelectorAll("a, button, [tabindex]:not([tabindex='-1'])")]
      .filter((el) => !el.hasAttribute("disabled"));

  let isOpen = false;
  let previousOverflow = "";
  let lastFocused = null;

  const normalize = (path) => {
    if (!path) return "/";
    return path.replace(/\/+$/, "") || "/";
  };

  const setActiveLinks = (pathname = window.location.pathname) => {
    const current = normalize(pathname);
    allLinks.forEach((link) => {
      const href = normalize(link.getAttribute("href"));
      const active = href === current;
      link.classList.toggle("is-active", active);
      if (active) {
        link.setAttribute("aria-current", "page");
      } else {
        link.removeAttribute("aria-current");
      }
    });
  };

  const setOpen = (open) => {
    if (!drawer) return;
    if (open === isOpen) return;
    isOpen = open;
    root.classList.toggle("drawer-open", open);
    drawer.setAttribute("aria-hidden", open ? "false" : "true");
    if (openBtn) openBtn.setAttribute("aria-expanded", String(open));
    if (open) {
      previousOverflow = document.body.style.overflow || "";
      document.body.style.overflow = "hidden";
      lastFocused = document.activeElement;
      const focusables = focusableDrawerNodes();
      if (focusables[0]) focusables[0].focus();
    } else {
      document.body.style.overflow = previousOverflow;
      if (lastFocused && typeof lastFocused.focus === "function") {
        lastFocused.focus();
      }
    }
  };

  const onKeyDown = (e) => {
    if (e.key === "Escape" && isOpen) {
      setOpen(false);
      return;
    }
    if (e.key !== "Tab" || !isOpen) return;
    const focusables = focusableDrawerNodes();
    if (!focusables.length) return;
    const first = focusables[0];
    const last = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault();
      last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault();
      first.focus();
    }
  };

  const syncScrollState = () => {
    root.classList.toggle("is-scrolled", window.scrollY > 18);
  };

  if (openBtn) openBtn.addEventListener("click", () => setOpen(true));
  if (closeBtn) closeBtn.addEventListener("click", () => setOpen(false));
  if (miniCloseBtn) miniCloseBtn.addEventListener("click", () => setOpen(false));
  if (backdrop) backdrop.addEventListener("click", () => setOpen(false));
  drawerLinks.forEach((link) => link.addEventListener("click", () => setOpen(false)));

  document.addEventListener("keydown", onKeyDown);
  window.addEventListener("scroll", syncScrollState, { passive: true });
  window.addEventListener("popstate", () => setActiveLinks());
  window.addEventListener("resize", () => {
    if (window.innerWidth > 1023 && isOpen) setOpen(false);
  });

  syncScrollState();
  setActiveLinks();
})();
</script>
