{% load static %}
<section class="figma-companies">
  <div class="figma-companies-head">
    <div class="figma-pill">
      <img src="{% static 'icons/pill-companies.svg' %}" alt="" />
      <span>COMPANIES</span>
    </div>
    <h2>Our Alumni Work at Top Companies</h2>
    <p>Trusted by hiring managers at leading tech organizations</p>
  </div>

  <div class="figma-company-ticker">
    <div class="figma-company-logos">
      <div class="figma-company-item"><img src="{% static 'icons/company-amazon.svg' %}" alt="Amazon" /></div>
      <div class="figma-company-item"><img src="{% static 'icons/company-microsoft.svg' %}" alt="Microsoft" /></div>
      <div class="figma-company-item"><img src="{% static 'icons/company-spotify.svg' %}" alt="Spotify" /></div>
      <div class="figma-company-item"><img src="{% static 'icons/company-slack.svg' %}" alt="Slack" /></div>
      <div class="figma-company-item"><img src="{% static 'icons/company-lenovo.svg' %}" alt="Lenovo" /></div>
      <div class="figma-company-item" aria-hidden="true"><img src="{% static 'icons/company-amazon.svg' %}" alt="" /></div>
      <div class="figma-company-item" aria-hidden="true"><img src="{% static 'icons/company-microsoft.svg' %}" alt="" /></div>
      <div class="figma-company-item" aria-hidden="true"><img src="{% static 'icons/company-spotify.svg' %}" alt="" /></div>
      <div class="figma-company-item" aria-hidden="true"><img src="{% static 'icons/company-slack.svg' %}" alt="" /></div>
      <div class="figma-company-item" aria-hidden="true"><img src="{% static 'icons/company-lenovo.svg' %}" alt="" /></div>
    </div>
  </div>
</section>

<style>
  .figma-companies {
    background: #f4f6ff;
    padding: 100px 32px 24px;
    font-family: "Manrope", sans-serif;
    text-align: center;
  }

  .figma-companies-head {
    max-width: 537px;
    margin: 0 auto 30px;
  }

  .figma-pill {
    width: fit-content;
    margin: 0 auto 20px;
    border-radius: 30px;
    border: 1px solid #e2d9ff;
    background: #fff;
    box-shadow: 0 0 20px rgba(128, 103, 246, 0.24);
    color: #200060;
    font-size: 14px;
    line-height: 20px;
    letter-spacing: 0.028px;
    padding: 10px 20px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .figma-pill img {
    width: 20px;
    height: 20px;
  }

  .figma-companies h2 {
    margin: 0;
    font-size: 28px;
    line-height: 36px;
    font-weight: 600;
    color: #1e0a5f;
  }

  .figma-companies p {
    margin: 15px 0 0;
    font-size: 16px;
    line-height: 26px;
    color: #3a3a66;
  }

  .figma-company-ticker {
    max-width: 1280px;
    margin: 0 auto;
    overflow: hidden;
    position: relative;
    min-height: 92px;
  }

  .figma-company-logos {
    display: flex;
    align-items: center;
    gap: 36px;
    width: max-content;
    animation: figmaCompanyTicker 28s linear infinite;
  }

  .figma-company-item {
    flex: 0 0 auto;
    width: 240px;
    height: 92px;
    display: grid;
    align-items: center;
    justify-items: center;
  }

  .figma-company-logos img {
    width: auto;
    max-width: 210px;
    margin: 0 auto;
    max-height: 62px;
    object-fit: contain;
    display: block;
  }

  .figma-company-ticker:hover .figma-company-logos {
    animation-play-state: paused;
  }

  @keyframes figmaCompanyTicker {
    from { transform: translateX(0); }
    to { transform: translateX(calc(-50% - 18px)); }
  }

  @media (max-width: 768px) {
    .figma-companies {
      padding: 56px 16px 24px;
    }

    .figma-company-ticker {
      min-height: 72px;
    }

    .figma-company-logos {
      gap: 24px;
      animation-duration: 24s;
    }

    .figma-company-item {
      width: 160px;
      height: 72px;
    }

    .figma-company-logos img {
      max-height: 56px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .figma-company-logos {
      animation: none;
    }
  }
</style>
